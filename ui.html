<!DOCTYPE html>
<html>
  <head>
    <style>
      :root {
        /* Dark theme colors */
        --background-color: #2c2c2c;
        --text-color: #ffffff;
        --text-color-secondary: #bfbfbf;
        --eyebrow-color: #ffffff;
        --hr-color: #444444;
        --highlight-active-frame-color: #4d5875;
        --scrollbar-color: #3d3d3d;
        --scrollbar-highlight-color: #545454;
        /* Light theme colors */
        --background-color-light: #ffffff;
        --text-color-light: #1a1a1a;
        --text-color-secondary-light: #7f7f7f;
        --eyebrow-color-light: #1a1a1a;
        --hr-color-light: #e6e6e6;
        --highlight-active-frame-color-light: #e5f4ff;
        --scrollbar-color-light: #d9d9d9;
        --scrollbar-highlight-color-light: #bdbdbd;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
        font-size: 11px;
        margin: 0;
        padding: 0 0 8 0px;
        background-color: var(--background-color);
        color: var(--text-color);
        user-select: none;
      }

      .light-mode {
        --background-color: var(--background-color-light);
        --text-color: var(--text-color-light);
        --text-color-secondary: var(--text-color-secondary-light);
        --eyebrow-color: var(--eyebrow-color-light);
        --hr-color: var(--hr-color-light);
        --highlight-active-frame-color: var(
          --highlight-active-frame-color-light
        );
        --scrollbar-color: var(--scrollbar-color-light);
        --scrollbar-highlight-color: var(--scrollbar-highlight-color-light);
      }

      .enable-transition {
        transition: background-color 0.3s, color 0.3s, border-color 0.3s;
      }

      .eyebrow {
        font-size: 8pt;
        text-transform: none;
        font-weight: bold;
        margin-top: 0;
        padding: 8px;
        color: var(--eyebrow-color);
      }

      .eyebrow-top {
        padding-top: 16px; /* Add 8px padding to the top */
      }

      /* Style for horizontal rule (divider) */
      .hr {
        border: none;
        height: 1px;
        background-color: var(--hr-color);
        margin: 8px 0; /* Vertical spacing, adjust as needed */
        width: 100%; /* Default width, can be adjusted as needed */
      }

      ul {
        list-style-type: none; /* Removes bullets */
        padding: 0;
        padding-bottom: 0px;
        margin: 0;
      }

      li {
        margin-bottom: 0px;
        cursor: pointer;
      }

      .frame-list {
        margin-top: 20px;
      }

      .frame-item {
        display: flex;
        align-items: center;
        justify-content: flex-start; /* Align items to the left */
        height: 32px; /* Set the height of each row */
        padding: 0 16px; /* Padding for some space on the sides */
      }

      /* Style for history list items */
      .history-item {
        display: flex;
        align-items: center;
        justify-content: space-between; /* Keep items on each end */
        height: 32px;
        padding: 0 12px;
      }

      /* Style for favorite list items */
      .favorite-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 32px;
        padding: 0 12px;
        cursor: grab;
      }
      .favorite-item.dragging {
        opacity: 0.4;
        cursor: grabbing;
      }
      .favorite-item.drop-above {
        box-shadow: inset 0 2px 0 0 #18a0fb;
      }
      .favorite-item.drop-below {
        box-shadow: inset 0 -2px 0 0 #18a0fb;
      }

      /* Style for name container */
      .name-container {
        display: flex;
        align-items: center;
        flex-grow: 1; /* Allows it to take up available space */
      }

      .name-container span:first-child {
        margin-right: 7px; /* Adjust the value to add space between Layer icon and Frame name */
      }

      .highlight-row-style {
        background-color: var(--highlight-active-frame-color);
      }
      .page-name-style {
        color: var(--text-color-secondary);
      }
      .component-color svg {
        color: #b384fb !important;
      }

      .favorite-name.editing {
        outline: 1px solid #18a0fb;
        border-radius: 2px;
        padding: 0 2px;
        cursor: text;
        white-space: nowrap;
      }

      /* Style for star icon in favorite list */
      .favorite-star-icon {
        cursor: pointer;
        margin-right: 8px; /* Space between star and frame name */
      }

      .star-icon {
        cursor: pointer;
        margin: 0 4 0 4px; /* Adjust the space between the star and the frame name */
      }

      .name-container {
        display: flex;
        align-items: center;
        flex-grow: 1; /* Allows it to take up available space */
      }

      /* New class for the settings title similar to History */
      .settings-title {
        font-size: 8pt; /* Adjust if needed */
        font-weight: bold; /* Bold font */
        color: var(--text-color-secondary);
        padding: 8px; /* Adjust padding as needed */
        /* Add any additional styles you want for the settings title */
      }

      /* Class for settings options like 'Clear Data' and 'Show Page Names' */
      .settings-item {
        display: flex;
        align-items: center;
        justify-content: space-between; /* Keep items on each end */
        height: 32px;
        padding: 0 16px;
        color: var(--text-color-secondary);
        cursor: default;
        margin-bottom: 0px;
      }

      .settings-item input[type="checkbox"] {
        margin-left: 0px; /* Space between label and checkbox */
        margin-right: 0px; /* Adjust this to control distance from right edge */
      }

      /* Style for checkbox — white in dark mode, black in light mode */
      .styled-checkbox {
        accent-color: var(--text-color);
        cursor: pointer;
        background-color: var(--background-color);
      }

      #clearData {
        cursor: pointer; /* Shows pointer cursor only when hovering over 'Clear Data' */
      }

      .history-length {
        cursor: pointer;
        color: var(--text-color);
        padding-right: 2px;
        /* Styles to make it look clickable and align it with the star/checkbox */
      }

      /* Style for resize handle */
      .resize-handle {
        position: fixed;
        bottom: 0;
        right: 0;
        width: 20px;
        height: 20px;
        cursor: nwse-resize;
      }

      /* Debug hop test button row at the top of the plugin */
      .hop-test-bar {
        display: flex;
        gap: 8px;
        padding: 8px 12px 8px 12px;
      }

      .hop-test-bar button {
        flex: 1;
        height: 32px;
        font-size: 9pt;
        font-family: inherit;
        color: var(--text-color);
        background-color: var(--highlight-active-frame-color);
        border: 1px solid var(--hr-color);
        border-radius: 4px;
        cursor: pointer;
      }

      .hop-test-bar button:hover {
        background-color: var(--scrollbar-highlight-color);
      }

      /* Style for the scrollbar itself */
      ::-webkit-scrollbar {
        width: 10px; /* Adjust the width of the scrollbar */
        background: var(--background-color);
      }

      /* Style for the scrollbar thumb */
      ::-webkit-scrollbar-thumb {
        background: var(--scrollbar-color); /* Color of the scrollbar thumb */
        border-radius: 6px; /* Rounded corners for the thumb */
        border: 2px var(--background-color) solid;
        background-clip: padding-box;
      }

      /* Style for the scrollbar thumb on hover */
      ::-webkit-scrollbar-thumb:hover {
        background: var(
          --scrollbar-highlight-color
        ); /* Darker color on hover */
      }
    </style>
  </head>

  <body>
    <!-- Debug hop test buttons (for verifying the hop-forward bug fix) -->
    <div class="hop-test-bar">
      <button id="hopBackBtn">Hop Back</button>
      <button id="hopForwardBtn">Hop Forward</button>
    </div>

    <!-- Divider -->
    <hr class="hr" />

    <!-- Favorites -->
    <div class="eyebrow">Favorites</div>
    <ul id="favoriteList"></ul>

    <!-- Divider -->
    <hr class="hr" />

    <!-- History -->
    <div class="eyebrow">History</div>
    <ul id="frameList"></ul>

    <!-- Divider -->
    <hr class="hr" />

    <!-- Settings -->
    <div class="settings-title">Settings</div>

    <!-- Setting: Appearance (cycles Light / Dark / System) -->
    <div class="settings-item">
      Appearance
      <span id="themeDisplay" class="history-length">System</span>
    </div>

    <!-- Setting: Toggle Page Names -->
    <div class="settings-item">
      Show Page Names
      <input
        type="checkbox"
        id="togglePageName"
        class="styled-checkbox"
        checked
      />
    </div>

    <!-- Setting: Track All Objects -->
    <div class="settings-item">
      Track All Objects
      <input
        type="checkbox"
        id="toggleTrackAllObjects"
        class="styled-checkbox"
        checked
      />
    </div>

    <!-- Setting: History Length -->
    <div class="settings-item">
      History Length
      <span id="historyLengthDisplay" class="history-length">
        <!-- Initial default value -->
        16
      </span>
    </div>

    <!-- Setting: Clear Data -->
    <div class="settings-item">
      <span id="clearData">Clear Data</span>
    </div>

    <div style="text-align:left;font-size:9px;color:#666;padding:2px 16px;">v1.1.4</div>

    <!-- Resize Handle -->
    <div class="resize-handle">
      <svg width="20" height="20" viewBox="0 0 20 20">
        <!-- Hiding visual cue <path d="M0,20 L20,20 L20,0" fill="none" stroke="#232323" stroke-width="4"/> -->
      </svg>
    </div>

    <script>
      let history = [];
      let currentIndex = -1;
      let favorites = [];
      let showPageName = true; // Initialize the variable to store the toggle state

      function updatePluginData() {
        const data = { history, currentIndex, favorites };
        parent.postMessage({ pluginMessage: data }, "*");
      }

      // Object to store SVG icons
      const icons = {
        frame: `
          <svg width="12" height="12" viewBox="0 0 13 13" fill="none" xmlns="http://www.w3.org/2000/svg" style="color: var(--text-color);">
            <path d="M0.650635 9.31396H12.6506M3.8269 12.5L3.8269 0.5M9.45239 12.5L9.45239 0.5M0.650635 3.70752H12.6506" stroke="currentColor"/>
          </svg>
    `,
        component: `
          <svg width="12" height="12" viewBox="0 0 13 13" fill="none" xmlns="http://www.w3.org/2000/svg" style="color: var(--text-color);">
            <path d="M9.50443 2.66092L6.89729 5.26807L4.25443 2.66092L6.89729 0.0180664L9.50443 2.66092ZM12.8616 6.01807L10.2544 8.66092L7.64729 6.01807L10.2544 3.41092L12.8616 6.01807ZM6.14729 6.01807L3.50443 8.66092L0.861572 6.01807L3.50443 3.41092L6.14729 6.01807ZM9.50443 9.41092L6.89729 12.0181L4.25443 9.41092L6.89729 6.76807L9.50443 9.41092Z" fill="currentColor"/>
          </svg>
    `,
        instance: `
          <svg width="12" height="12" viewBox="0 0 13 13" fill="none" xmlns="http://www.w3.org/2000/svg" style="color: var(--text-color);">
            <path d="M6.5 0.707107L12.2929 6.5L6.5 12.2929L0.707107 6.5L6.5 0.707107Z" stroke="currentColor" fill="none" stroke-linejoin="round"/>
          </svg>
    `,
        variant: `
          <svg width="12" height="12" viewBox="0 0 13 13" fill="none" xmlns="http://www.w3.org/2000/svg" style="color: var(--text-color);">
            <path d="M6.5 0.707107L12.2929 6.5L6.5 12.2929L0.707107 6.5L6.5 0.707107Z" fill="currentColor"/>
          </svg>
    `,
        section: `
          <svg width="12" height="12" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg" style="color: var(--text-color);">
            <path d="M0.610596 0.839844H7.09424V5.26802H0.610596V0.839844ZM0.610596 0.839844H12.6106V12.8398H0.610596V0.839844Z" stroke="currentColor"/>
          </svg>
    `,
        text: `
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg" style="color: var(--text-color);">
            <path d="M1.5 1.5H10.5V3M6 1.5V10.5M4 10.5H8" stroke="currentColor" stroke-linecap="square"/>
          </svg>
    `,
        group: `
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg" style="color: var(--text-color);">
            <rect x="1" y="1" width="3" height="3" stroke="currentColor"/>
            <rect x="8" y="1" width="3" height="3" stroke="currentColor"/>
            <rect x="1" y="8" width="3" height="3" stroke="currentColor"/>
            <rect x="8" y="8" width="3" height="3" stroke="currentColor"/>
          </svg>
    `,
        shape: `
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg" style="color: var(--text-color);">
            <circle cx="6" cy="6" r="5" stroke="currentColor"/>
          </svg>
    `,
        rectangle: `
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg" style="color: var(--text-color);">
            <rect x="1.5" y="2.5" width="9" height="7" stroke="currentColor" fill="none"/>
          </svg>
    `,
        ellipse: `
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg" style="color: var(--text-color);">
            <circle cx="6" cy="6" r="4.5" stroke="currentColor" fill="none"/>
          </svg>
    `,
        line: `
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg" style="color: var(--text-color);">
            <line x1="2" y1="10" x2="10" y2="2" stroke="currentColor" stroke-linecap="round"/>
          </svg>
    `,
        polygon: `
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg" style="color: var(--text-color);">
            <path d="M6 1.5L10.76 10H1.24L6 1.5Z" stroke="currentColor" fill="none" stroke-linejoin="round"/>
          </svg>
    `,
        star: `
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg" style="color: var(--text-color);">
            <path d="M6 1L7.18 4.38L10.76 4.45L7.90 6.62L8.94 10.05L6 8L3.06 10.05L4.10 6.62L1.24 4.45L4.82 4.38Z" stroke="currentColor" fill="none" stroke-linejoin="round"/>
          </svg>
    `,
        vector: `
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg" style="color: var(--text-color);">
            <path d="M2 10L10 2" stroke="currentColor" stroke-linecap="round"/>
            <rect x="0.5" y="8.5" width="3" height="3" stroke="currentColor" fill="none"/>
            <rect x="8.5" y="0.5" width="3" height="3" stroke="currentColor" fill="none"/>
          </svg>
    `,
        media: `
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg" style="color: var(--text-color);">
            <rect x="1" y="1.5" width="10" height="9" rx="1.5" stroke="currentColor"/>
            <circle cx="8.25" cy="4.25" r="0.9" fill="currentColor"/>
            <path d="M1.5 9L4.5 6L7 8L9 6.5L10.5 7.75V10H1.5V9Z" fill="currentColor"/>
          </svg>
    `,
      };

      // Build the icon span for a frame/favorite based on its node type.
      // Returns a <span> element with the SVG icon and the right color class.
      function buildFrameIcon(frame) {
        let iconHTML;
        if (frame.isImage) {
          iconHTML = icons.media;
        } else
        switch (frame.type) {
          case "FRAME":
            iconHTML = icons.frame;
            break;
          case "SECTION":
            iconHTML = icons.section;
            break;
          case "COMPONENT":
            iconHTML = frame.isVariant ? icons.variant : icons.component;
            break;
          case "COMPONENT_SET":
            iconHTML = icons.component;
            break;
          case "INSTANCE":
            iconHTML = icons.instance;
            break;
          case "TEXT":
            iconHTML = icons.text;
            break;
          case "GROUP":
            iconHTML = icons.group;
            break;
          case "RECTANGLE":
            iconHTML = icons.rectangle;
            break;
          case "ELLIPSE":
            iconHTML = icons.ellipse;
            break;
          case "POLYGON":
            iconHTML = icons.polygon;
            break;
          case "STAR":
            iconHTML = icons.star;
            break;
          case "LINE":
            iconHTML = icons.line;
            break;
          case "VECTOR":
          case "BOOLEAN_OPERATION":
            iconHTML = icons.vector;
            break;
          case "MEDIA":
            iconHTML = icons.media;
            break;
          case "SLICE":
          case "STICKY":
          case "CONNECTOR":
          case "SHAPE_WITH_TEXT":
          case "STAMP":
          case "TABLE":
          case "HIGHLIGHT":
          case "WASHI_TAPE":
          case "CODE_BLOCK":
          case "EMBED":
          case "LINK_UNFURL":
          case "WIDGET":
            iconHTML = icons.shape;
            break;
          default:
            iconHTML = icons.shape;
        }
        const span = document.createElement("span");
        span.innerHTML = iconHTML;
        if (
          frame.type === "COMPONENT" ||
          frame.type === "COMPONENT_SET" ||
          frame.type === "INSTANCE"
        ) {
          span.classList.add("component-color");
        }
        return span;
      }

      function updateFrameList(historyData, currentFrameId) {
        // Get the list element and clear its current content
        const list = document.getElementById("frameList");
        list.innerHTML = "";
        let currentFrameFound = false;

        // Loop through each frame in the history data
        historyData.forEach((frame) => {
          const listItem = document.createElement("li");
          listItem.classList.add("history-item");

          // Create a container for frame icon and name
          const nameContainer = document.createElement("div");
          nameContainer.classList.add("name-container");

          // Add the appropriate icon
          const frameIcon = buildFrameIcon(frame);
          nameContainer.appendChild(frameIcon);

          // Create a span to hold the frame name
          const frameName = document.createElement("span");
          const truncateLength = showPageName ? 50 : 76;
          const truncatedFrameName =
            frame.name.length > truncateLength
              ? frame.name.substring(0, truncateLength - 3) + "..."
              : frame.name;
          frameName.textContent = truncatedFrameName;
          nameContainer.appendChild(frameName);

          listItem.appendChild(nameContainer);

          // If showing page names, add the page name to the list item
          if (showPageName && frame.pageName) {
            const pageNameTruncateLength = 22;
            const truncatedPageName =
              frame.pageName.length > pageNameTruncateLength
                ? frame.pageName.substring(0, pageNameTruncateLength - 3) +
                  "..."
                : frame.pageName;
            const pageNameSpan = document.createElement("span");
            pageNameSpan.textContent = ` (${truncatedPageName})`;
            pageNameSpan.className = "page-name-style";
            frameName.appendChild(pageNameSpan);
          }

          listItem.appendChild(nameContainer);

          // Create and append the star icon for the favorites feature
          const star = document.createElement("span");
          star.classList.add("star-icon");
          star.textContent = favorites.some((fav) => fav.id === frame.id)
            ? "★"
            : "☆";
          star.onclick = () => toggleFavorite(frame, historyData);
          listItem.appendChild(star);

          // Set an onclick event to jump to the frame when the list item is clicked
          listItem.onclick = (event) => {
            if (!event.target.classList.contains("star-icon")) {
              jumpToFrame(frame.id, frame.pageId);
            }
          };

          // Highlight the current frame if found
          if (frame.id === currentFrameId && !currentFrameFound) {
            listItem.classList.add("highlight-row-style");
            currentFrameFound = true;
          }

          // Append the list item to the list
          list.appendChild(listItem);
        });
      }

      function updateFavoriteList(favorites, currentFavoriteIndex) {
        const list = document.getElementById("favoriteList");
        list.innerHTML = "";
        const truncateLength = 77; // Truncation length for frame names in favorites
        let dragSourceIndex = null;

        favorites.forEach((frame, index) => {
          // Fetch the latest node information from Figma
          const node = parent.postMessage(
            { pluginMessage: { type: "fetchNodeInfo", frameId: frame.id } },
            "*"
          );
          const updatedFrameName = node && node.name ? node.name : frame.name;

          const listItem = document.createElement("li");
          listItem.classList.add("favorite-item");
          listItem.draggable = true;

          listItem.addEventListener("dragstart", (e) => {
            dragSourceIndex = index;
            listItem.classList.add("dragging");
            if (e.dataTransfer) {
              e.dataTransfer.effectAllowed = "move";
              e.dataTransfer.setData("text/plain", String(index));
            }
          });
          listItem.addEventListener("dragover", (e) => {
            if (dragSourceIndex === null) return;
            e.preventDefault();
            if (e.dataTransfer) e.dataTransfer.dropEffect = "move";
            const rect = listItem.getBoundingClientRect();
            const isAbove = e.clientY < rect.top + rect.height / 2;
            listItem.classList.toggle("drop-above", isAbove);
            listItem.classList.toggle("drop-below", !isAbove);
          });
          listItem.addEventListener("dragleave", () => {
            listItem.classList.remove("drop-above", "drop-below");
          });
          listItem.addEventListener("drop", (e) => {
            e.preventDefault();
            listItem.classList.remove("drop-above", "drop-below");
            if (dragSourceIndex === null || dragSourceIndex === index) return;
            const rect = listItem.getBoundingClientRect();
            const dropBelow = e.clientY >= rect.top + rect.height / 2;
            let targetIndex = dropBelow ? index + 1 : index;
            if (dragSourceIndex < targetIndex) targetIndex -= 1;
            if (targetIndex === dragSourceIndex) return;
            const [moved] = favorites.splice(dragSourceIndex, 1);
            favorites.splice(targetIndex, 0, moved);
            // Keep highlight pointing at the same item if it moved
            if (currentFavoriteIndex === dragSourceIndex) {
              currentFavoriteIndex = targetIndex;
            } else if (
              dragSourceIndex < currentFavoriteIndex &&
              targetIndex >= currentFavoriteIndex
            ) {
              currentFavoriteIndex -= 1;
            } else if (
              dragSourceIndex > currentFavoriteIndex &&
              targetIndex <= currentFavoriteIndex
            ) {
              currentFavoriteIndex += 1;
            }
            parent.postMessage(
              { pluginMessage: { type: "updateFavoritesOrder", favorites } },
              "*"
            );
            updateFavoriteList(favorites, currentFavoriteIndex);
          });
          listItem.addEventListener("dragend", () => {
            dragSourceIndex = null;
            listItem.classList.remove("dragging", "drop-above", "drop-below");
            // Defensive: clear stray drop classes from any sibling
            list.querySelectorAll(".drop-above, .drop-below").forEach((el) => {
              el.classList.remove("drop-above", "drop-below");
            });
          });

          // Container for icon and frame name
          const nameContainer = document.createElement("div");
          nameContainer.classList.add("name-container");

          const favIcon = buildFrameIcon(frame);
          favIcon.classList.add("favorite-star-icon");
          nameContainer.appendChild(favIcon);

          const frameName = document.createElement("span");
          frameName.classList.add("favorite-name");
          const displayName = frame.customName || updatedFrameName;
          frameName.textContent =
            displayName.length > truncateLength
              ? displayName.substring(0, truncateLength - 3) + "..."
              : displayName;
          frameName.title = displayName;
          nameContainer.appendChild(frameName);

          let pendingJumpTimer = null;

          // Intercept single-click on the name so the row's jump handler
          // doesn't fire — instead, defer the jump so a dblclick can cancel it.
          frameName.addEventListener("click", (e) => {
            e.stopPropagation();
            if (frameName.isContentEditable) return;
            if (pendingJumpTimer) return;
            pendingJumpTimer = setTimeout(() => {
              pendingJumpTimer = null;
              jumpToFrame(frame.id, frame.pageId);
              currentFavoriteIndex = index;
              updateFavoriteList(favorites, currentFavoriteIndex);
            }, 250);
          });
          frameName.addEventListener("mousedown", (e) => {
            // Prevent mousedown from reaching listItem (and from starting
            // a text selection that interferes with dblclick).
            e.stopPropagation();
          });

          frameName.ondblclick = (event) => {
            event.stopPropagation();
            if (pendingJumpTimer) {
              clearTimeout(pendingJumpTimer);
              pendingJumpTimer = null;
            }
            listItem.draggable = false;
            const original = frame.customName || updatedFrameName;
            frameName.textContent = original;
            frameName.contentEditable = "true";
            frameName.classList.add("editing");
            frameName.focus();
            const range = document.createRange();
            range.selectNodeContents(frameName);
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);
          };

          let renameHandled = false;
          const commitRename = () => {
            if (renameHandled) return;
            renameHandled = true;
            const newName = frameName.textContent.trim();
            frameName.contentEditable = "false";
            frameName.classList.remove("editing");
            listItem.draggable = true;
            parent.postMessage(
              {
                pluginMessage: {
                  type: "renameFavorite",
                  id: frame.id,
                  customName: newName,
                },
              },
              "*"
            );
          };
          const cancelRename = () => {
            if (renameHandled) return;
            renameHandled = true;
            frameName.contentEditable = "false";
            frameName.classList.remove("editing");
            listItem.draggable = true;
            updateFavoriteList(favorites, currentFavoriteIndex);
          };

          frameName.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
              e.preventDefault();
              commitRename();
              frameName.blur();
            } else if (e.key === "Escape") {
              e.preventDefault();
              cancelRename();
            }
          });
          frameName.addEventListener("blur", () => {
            if (frameName.contentEditable === "true") commitRename();
          });

          listItem.appendChild(nameContainer);

          listItem.onclick = (event) => {
            jumpToFrame(frame.id, frame.pageId);
            currentFavoriteIndex = index;
            updateFavoriteList(favorites, currentFavoriteIndex);
          };

          if (currentFavoriteIndex === index) {
            listItem.style.backgroundColor = "";
            listItem.classList.add("highlight-row-style");
          }

          list.appendChild(listItem);
        });
      }

      function toggleFavorite(frame, historyData = null) {
        const isFavorite = favorites.some((fav) => fav.id === frame.id);
        if (isFavorite) {
          favorites = favorites.filter((fav) => fav.id !== frame.id);
        } else {
          favorites.push({
            id: frame.id,
            name: frame.name,
            pageId: frame.pageId,
            pageName: frame.pageName,
            isSection: frame.isSection || false,
          });
        }
        parent.postMessage(
          { pluginMessage: { type: "updateFavorites", favorites: favorites } },
          "*"
        );
      }

      function jumpToFrame(frameId, pageId) {
        parent.postMessage(
          { pluginMessage: { type: "jumpToFrame", frameId, pageId } },
          "*"
        );
      }

      function toggleTransition(enable) {
        const body = document.body;
        if (enable) {
          body.classList.add("enable-transition");
        } else {
          body.classList.remove("enable-transition");
        }
      }

      // Debug hop test buttons — send the same messages the menu commands would
      document.getElementById("hopBackBtn").onclick = function () {
        parent.postMessage(
          { pluginMessage: { type: "hopBackwards" } },
          "*"
        );
      };
      document.getElementById("hopForwardBtn").onclick = function () {
        parent.postMessage(
          { pluginMessage: { type: "hopForwards" } },
          "*"
        );
      };

      // Function to handle the 'Clear Data' button click
      document.getElementById("clearData").onclick = function () {
        // Reset local history, currentIndex, and favorites
        history = [];
        currentIndex = -1;
        favorites = []; // Make sure favorites is an empty array, not undefined

        // Update the frame list and favorites list in the UI to reflect the cleared data
        updateFrameList([]);
        updateFavoriteList(favorites, -1); // Pass empty favorites and reset index

        // Send a message to the main plugin script to clear the data there as well
        parent.postMessage({ pluginMessage: { type: "clearData" } }, "*");
      };

      // Event listener for cycling history length
      document
        .getElementById("historyLengthDisplay")
        .addEventListener("click", function () {
          parent.postMessage(
            { pluginMessage: { type: "cycleHistoryLength" } },
            "*"
          );
        });

      // Appearance cycle: light -> dark -> system -> light
      let currentThemeIntent = "system";
      const systemDarkQuery = window.matchMedia("(prefers-color-scheme: dark)");

      function resolveTheme(intent) {
        if (intent === "system") {
          return systemDarkQuery.matches ? "dark" : "light";
        }
        return intent;
      }

      function applyThemeToBody(intent) {
        currentThemeIntent = intent;
        const resolved = resolveTheme(intent);
        document.body.classList.toggle("light-mode", resolved === "light");
        const display = document.getElementById("themeDisplay");
        if (display) {
          display.textContent =
            intent === "light"
              ? "Light"
              : intent === "dark"
              ? "Dark"
              : "System";
        }
      }

      // Re-apply on OS appearance change when intent is "system"
      systemDarkQuery.addEventListener("change", function () {
        if (currentThemeIntent === "system") {
          toggleTransition(true);
          setTimeout(() => toggleTransition(false), 300);
          applyThemeToBody("system");
        }
      });

      document
        .getElementById("themeDisplay")
        .addEventListener("click", function () {
          toggleTransition(true); // Enable transition

          setTimeout(() => {
            toggleTransition(false); // Disable transition after some time
          }, 300); // Duration should match the CSS transition duration

          const nextIntent =
            currentThemeIntent === "light"
              ? "dark"
              : currentThemeIntent === "dark"
              ? "system"
              : "light";

          applyThemeToBody(nextIntent);

          parent.postMessage(
            { pluginMessage: { type: "updateTheme", theme: nextIntent } },
            "*"
          );
        });

      // Function to handle the 'Track All Objects' toggle
      document
        .getElementById("toggleTrackAllObjects")
        .addEventListener("change", function (event) {
          parent.postMessage(
            {
              pluginMessage: {
                type: "toggleTrackAllObjects",
                value: event.target.checked,
              },
            },
            "*"
          );
        });

      // Function to handle the 'Show Page Name' toggle
      document
        .getElementById("togglePageName")
        .addEventListener("change", function (event) {
          showPageName = event.target.checked; // Update showPageName with the new toggle state
          parent.postMessage(
            {
              pluginMessage: {
                type: "togglePageName",
                value: showPageName,
              },
            },
            "*"
          );

          // Call updateFrameList to update the UI with the new state
          updateFrameList(history, currentIndex);
        });

      // The window.onmessage listener handles messages sent from the plugin's main code.
      // It updates the plugin's UI in response to changes in the plugin's state or user interactions.
      // This includes updating the history list, toggling page name visibility, and changing history length settings.
      window.onload = () => {
        toggleTransition(false); // Disable transition on initial load
        // Resize handle logic
        const resizeHandle = document.querySelector(".resize-handle");
        resizeHandle.addEventListener("mousedown", (event) => {
          window.onmousemove = handleMouseMove;
          window.onmouseup = () => {
            window.onmousemove = null;
            window.onmouseup = null;
          };
        });

        function handleMouseMove(event) {
          const minWidth = 240; // Set a minimum width
          const minHeight = 80; // Set a minimum height

          let newWidth = window.innerWidth + event.movementX;
          let newHeight = window.innerHeight + event.movementY;

          // Ensure the new width and height are not less than the minimum
          newWidth = Math.max(newWidth, minWidth);
          newHeight = Math.max(newHeight, minHeight);

          parent.postMessage(
            {
              pluginMessage: {
                type: "resize",
                width: newWidth,
                height: newHeight,
              },
            },
            "*"
          );
        }
      };

      let currentFavoriteIndex; // Declare this variable outside the window.onmessage handler

      window.onmessage = (event) => {
        const {
          type,
          historyData,
          currentFrameId,
          favorites: updatedFavorites,
          showPageName: newShowPageName,
          historyLength: newHistoryLength,
          currentFavoriteIndex,
        } = event.data.pluginMessage;

        switch (type) {
          case "dataCleared":
            // Clear UI components
            document.getElementById("favoriteList").innerHTML = "";
            document.getElementById("frameList").innerHTML = "";
            // Reset any other UI elements that display data
            document.getElementById("togglePageName").checked = true; // Reset to default if needed
            // More UI reset logic if necessary...
            break;

          case "update":
            // Update history with the data received from the main plugin script
            history = historyData;
            // Find the current index based on the frame ID
            currentIndex = historyData.findIndex(
              (frame) => frame.id === currentFrameId
            );
            // Update favorites with the data received
            favorites = updatedFavorites;
            // Update the list of frames in the UI
            updateFrameList(historyData, currentFrameId);
            // Update the list of favorites in the UI
            updateFavoriteList(favorites, currentFavoriteIndex);
            // Update the history length display in the UI
            document.getElementById("historyLengthDisplay").textContent =
              event.data.pluginMessage.historyLength;
            break;

          case "toggleShowPageName":
            // This case is triggered when the state changes are sent from the plugin code
            document.getElementById("togglePageName").checked = newShowPageName;
            // Also, make sure to update the UI elements if needed
            updateFrameList(history, currentIndex);
            updateFavoriteList(favorites, currentFavoriteIndex);
            break;

          case "updateHistoryLengthDisplay":
            console.log(
              "Updating history length display to:",
              event.data.pluginMessage.historyLength
            ); // Debug log

            document.getElementById("historyLengthDisplay").textContent =
              newHistoryLength;
            updateFrameList(history, currentIndex);
            updateFavoriteList(favorites, currentFavoriteIndex);
            break;

          case "applyTheme":
            // Apply the theme intent received from the main code
            applyThemeToBody(event.data.pluginMessage.theme);
            break;

          case "loadSettings":
            const settingsItems = Array.from(
              document.querySelectorAll(".settings-item")
            );

            // The 'Show Page Names' setting is the second settings item (index 1)
            const showPageNamesSetting =
              document.getElementById("togglePageName");

            // Update the checkbox state based on the message
            showPageNamesSetting.checked =
              event.data.pluginMessage.showPageName;

            // Apply the persisted Track All Objects setting
            document.getElementById("toggleTrackAllObjects").checked =
              !!event.data.pluginMessage.trackAllObjects;

            // Related to Theme
            applyThemeToBody(event.data.pluginMessage.theme || "dark");

            // Display settings according to editor type
            const allSettingsItems =
              document.querySelectorAll(".settings-item");
            const appearanceSettingItem = allSettingsItems[0];
            const pageNamesSettingItem = allSettingsItems[1];
            const isFigJam =
              event.data.pluginMessage.editorType === "figjam";
            pageNamesSettingItem.style.display = isFigJam ? "none" : "flex";
            // FigJam has no dark mode, so hide the Appearance control there
            appearanceSettingItem.style.display = isFigJam ? "none" : "flex";
            break;

            // Use event.data.pluginMessage.editorType to get the editor type
            if (event.data.pluginMessage.editorType === "figjam") {
              // Hide the "Show Page Names" setting if in FigJam
              showPageNamesSetting.style.display = "none";
            } else {
              // Make sure it's visible in Figma
              showPageNamesSetting.style.display = "flex";
            }

            break;

          case "showPageNameUpdated":
            // This message should be sent from code.js after the showPageName state is updated
            document.getElementById("togglePageName").checked = newShowPageName;
            break;

          default:
            console.log("Received an unhandled message type:", type);
            break;
        }
      };
    </script>
  </body>
</html>
